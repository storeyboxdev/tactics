<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tactics</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #e8e8e8;
        font-family: ui-sans-serif, system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #hud > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
